services:
  api:
    build: .
    container_name: ai_cv_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ai_cv_service
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  worker:
    build: .
    container_name: ai_cv_worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ai_cv_service
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
      rabbitmq:
        condition: service_started

  scoring_result_consumer:
    build: .
    container_name: ai_cv_scoring_result_consumer
    command: python -m app.workers.scoring_result_consumer
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  scoring_ai:
    build: ../scoring_cv_ai
    container_name: ai_cv_scoring_ai
    command: uvicorn app.main:app --host 0.0.0.0 --port 5005 --reload
    volumes:
      - ../scoring_cv_ai:/app
      - ./uploads:/app/uploads
    ports:
      - "5005:5005"
    environment:
      APP_NAME: CV Scoring AI Service
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      SERVICE_PORT: 5005
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_REQUEST_ROUTING_KEY: ${RABBITMQ_SCORING_REQUEST_ROUTING_KEY}
      RABBITMQ_RESULT_ROUTING_KEY: ${RABBITMQ_SCORING_RESULT_ROUTING_KEY}
      RABBITMQ_FAILED_ROUTING_KEY: ${RABBITMQ_SCORING_FAILED_ROUTING_KEY}
      RABBITMQ_REQUEST_QUEUE: cv.scoring.request.queue
      ENABLE_RABBITMQ_CONSUMER: true
      CV_BASE_DIR: /app
      CV_ALLOWED_ROOTS: /app/uploads/cvs
      AISTUDIO_API_KEY: ${AISTUDIO_API_KEY}
      AISTUDIO_MODEL: ${AISTUDIO_MODEL}
      AISTUDIO_TIMEOUT_SECONDS: ${AISTUDIO_TIMEOUT_SECONDS}
    depends_on:
      - rabbitmq

  db:
    image: postgres:16
    container_name: ai_cv_db
    environment:
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
      POSTGRES_DB: ai_cv_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_cv_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: ai_cv_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ai_cv_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
